<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>科普解构器 · 让视频变成你的私人课程</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="description" content="抖音黑客松 · 把科普视频自动解构为概念图谱、知识卡片、AI 追问与游戏化测验。" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: '#1a1d29',
            inkSoft: '#222636',
            inkLine: '#2d3146',
            brand: '#6366f1',
            brandSoft: '#818cf8',
            brandDeep: '#4f46e5',
          },
          boxShadow: {
            card: '0 4px 24px rgba(0,0,0,0.25)',
          },
          borderRadius: {
            xl2: '12px',
          },
        },
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="styles.css?v=20260523d" />
</head>
<body class="bg-ink text-white antialiased min-h-screen">
  <!-- ============== HERO ============== -->
  <header id="hero-header" class="max-w-6xl mx-auto px-6 pt-16 pb-10 text-center">
    <h1 class="text-5xl md:text-6xl font-bold tracking-tight">
      科普解构器
      <span class="block text-brandSoft text-2xl md:text-3xl font-medium mt-3">
        让视频变成你的私人课程
      </span>
    </h1>
    <p class="mt-6 text-white/60 max-w-2xl mx-auto leading-relaxed">
      上传一段科普视频，AI 会替你提炼概念、绘制图谱、出题考你、随时追问。
      把碎片化的"看过"，变成可学、可判、可用的"学会"。
    </p>
  </header>

  <!-- ============== 区域一：输入区 ============== -->
  <section id="input-section" class="max-w-4xl mx-auto px-6 pb-16">
    <!-- 拖拽上传 -->
    <div
      id="dropzone"
      class="relative bg-inkSoft border-2 border-dashed border-inkLine rounded-xl2 p-12 text-center cursor-pointer transition hover:border-brand"
    >
      <input id="file-input" type="file" accept="video/mp4,video/*" class="hidden" />
      <div class="flex flex-col items-center gap-3">
        <div class="w-16 h-16 rounded-full bg-brand/10 flex items-center justify-center">
          <svg viewBox="0 0 24 24" fill="none" class="w-8 h-8 text-brand">
            <path d="M12 5v14m0-14l-5 5m5-5l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="text-lg font-medium">拖拽视频到此处，或点击选择文件</div>
        <div class="text-sm text-white/40">支持 MP4 等常见格式</div>
      </div>
      <!-- 上传进度条 -->
      <div id="upload-progress" class="hidden absolute inset-x-6 bottom-4">
        <div class="h-2 bg-inkLine rounded-full overflow-hidden">
          <div id="upload-bar" class="h-full bg-brand transition-all" style="width: 0%"></div>
        </div>
        <div class="text-xs text-white/60 mt-1" id="upload-pct">0%</div>
      </div>
    </div>

    <!-- URL 输入 -->
    <div class="mt-6 flex gap-3">
      <input
        id="url-input"
        type="text"
        placeholder="或粘贴抖音/B站视频链接…"
        class="flex-1 bg-inkSoft border border-inkLine rounded-xl2 px-4 py-3 text-white placeholder-white/30 focus:outline-none focus:border-brand transition"
      />
      <button
        id="url-submit"
        class="bg-brand hover:bg-brandDeep px-6 py-3 rounded-xl2 font-medium transition"
      >
        解析链接
      </button>
    </div>

    <!-- 我的历史记录（localStorage） -->
    <div class="mt-10">
      <div class="flex items-center justify-between mb-3">
        <div class="text-sm text-white/40">我的历史记录</div>
        <button id="history-clear" class="hidden text-xs text-white/30 hover:text-white/60 transition">清空</button>
      </div>
      <div id="demo-list" class="grid grid-cols-2 md:grid-cols-4 gap-3">
        <!-- 由 JS 渲染：有记录就显示历史卡片，没记录显示空状态 -->
      </div>
    </div>
  </section>

  <!-- ============== 区域二：分析进度全屏遮罩 ============== -->
  <div id="progress-overlay" class="hidden fixed inset-0 bg-ink/95 backdrop-blur-sm z-50 flex items-center justify-center transition-opacity">
    <div class="text-center max-w-md px-6">
      <!-- 阶段图标 -->
      <div id="stage-icons" class="flex items-center justify-center gap-4 mb-8">
        <div class="stage-icon" data-stage="uploading">
          <div class="dot"></div>
          <div class="label">上传</div>
        </div>
        <div class="stage-line"></div>
        <div class="stage-icon" data-stage="analyzing">
          <div class="dot"></div>
          <div class="label">理解</div>
        </div>
        <div class="stage-line"></div>
        <div class="stage-icon" data-stage="structuring">
          <div class="dot"></div>
          <div class="label">构建</div>
        </div>
        <div class="stage-line"></div>
        <div class="stage-icon" data-stage="done">
          <div class="dot"></div>
          <div class="label">完成</div>
        </div>
      </div>
      <div id="progress-message" class="text-xl font-medium mb-6">正在唤醒 AI…</div>
      <div class="h-2 bg-inkLine rounded-full overflow-hidden mb-3">
        <div id="progress-bar" class="h-full bg-brand transition-all duration-500" style="width: 0%"></div>
      </div>
      <div id="progress-pct" class="text-sm text-white/40">0%</div>
    </div>
  </div>

  <!-- ============== 区域三：结果展示 ============== -->
  <section id="result-section" class="hidden max-w-7xl mx-auto px-6 pt-10 pb-24">
    <div class="flex gap-6">
      <!-- 左侧：纵向 Tab 导航 + 返回 -->
      <aside class="w-44 shrink-0 self-start sticky top-6">
        <nav class="tab-nav-vertical bg-inkSoft rounded-xl2 p-2 flex flex-col gap-1">
          <button class="tab-btn active" data-tab="cards">知识卡片</button>
          <button class="tab-btn" data-tab="graph">概念图谱</button>
          <button class="tab-btn" data-tab="chat">AI 追问</button>
          <button class="tab-btn" data-tab="quiz">知识测验</button>
        </nav>
        <button id="export-md" class="mt-3 w-full text-sm py-2.5 px-3 rounded-xl2 transition text-left flex items-center gap-2"
                style="background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.3); color: #c7d2fe;">
          <span style="font-family: ui-monospace,monospace; font-size:12px">↓</span>
          <span>导出笔记 .md</span>
        </button>
        <button id="back-btn" class="mt-2 w-full text-white/40 hover:text-white text-sm py-2 rounded-xl2 hover:bg-inkSoft transition text-left px-3">
          ← 返回首页
        </button>
      </aside>

      <!-- 右侧：Tab 内容区 -->
      <div class="flex-1 min-w-0">

    <!-- Tab 1: 知识卡片 -->
    <div id="tab-cards" class="tab-panel">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 space-y-6">
          <div class="bg-inkSoft rounded-xl2 p-6">
            <h2 id="result-title" class="text-2xl font-bold mb-3"></h2>
            <blockquote id="result-summary" class="text-lg text-white/80 border-l-4 border-brand pl-4 leading-relaxed"></blockquote>
          </div>
          <div>
            <div class="text-sm text-white/40 mb-3">核心概念</div>
            <div id="concept-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
          </div>
        </div>
        <aside class="bg-inkSoft rounded-xl2 p-6 h-fit lg:sticky lg:top-6">
          <div class="text-sm text-white/40 mb-3">关键时间点</div>
          <div id="key-points-list" class="space-y-3"></div>
        </aside>
      </div>
    </div>

    <!-- Tab 2: 概念图谱 -->
    <div id="tab-graph" class="tab-panel hidden">
      <div class="integrated-view flex gap-3 items-stretch" style="height: 660px">

        <!-- ============ 左栏：筛选 / 统计 ============ -->
        <aside class="w-44 shrink-0 bg-inkSoft rounded-xl2 p-3 overflow-y-auto flex flex-col gap-4">
          <div>
            <div class="panel-section-title">概念层级</div>
            <div id="filter-levels" class="space-y-1 mt-2"></div>
          </div>
          <div>
            <div class="panel-section-title">关系类型</div>
            <div id="filter-relations" class="space-y-1 mt-2"></div>
          </div>
          <div class="mt-auto pt-2 border-t border-inkLine text-[11px] text-white/40" id="graph-stats">
            节点 0 · 连线 0
          </div>
        </aside>

        <!-- ============ 中央：主图谱 ============ -->
        <div class="flex-1 bg-inkSoft rounded-xl2 p-3 relative overflow-hidden flex flex-col">
          <div class="flex items-center justify-between mb-2 px-1 text-xs text-white/40">
            <span>拖动节点 · 悬停查看说明 · 滚轮缩放</span>
            <div class="flex gap-1">
              <button class="layout-btn active" data-layout="force">力布局</button>
              <button class="layout-btn" data-layout="radial">径向 mindmap</button>
            </div>
          </div>
          <div class="relative flex-1">
            <svg id="graph-svg" class="w-full h-full"></svg>

            <!-- 左上：控制面板 -->
            <div id="graph-controls" class="absolute top-2 left-2 flex flex-col gap-2 z-10">
              <button id="graph-play" class="graph-ctrl-btn graph-ctrl-primary" type="button">
                <span class="graph-ctrl-icon">▶</span>
                <span class="graph-ctrl-label">讲解</span>
              </button>
              <button id="graph-reset" class="graph-ctrl-btn graph-ctrl-sm" type="button" title="重置布局">
                ↺ 重置
              </button>
            </div>

            <!-- 右上：关系图例 -->
            <div id="graph-legend" class="absolute top-2 right-2 z-10"></div>

            <!-- 底部讲解栏 -->
            <div id="graph-tour-bar" class="hidden absolute left-0 right-0 bottom-0 px-4 py-3 bg-ink/90 border-t border-inkLine text-sm"></div>

            <div id="graph-tooltip" class="hidden absolute bg-ink border border-inkLine rounded-xl2 p-3 max-w-xs text-sm shadow-card pointer-events-none z-20"></div>
          </div>
        </div>

        <!-- ============ 右栏：学习进度 + 概念清单 ============ -->
        <aside class="w-60 shrink-0 bg-inkSoft rounded-xl2 p-3 flex flex-col overflow-hidden">
          <div class="panel-section-title">学习进度</div>
          <div class="quiz-progress mt-2 mb-1.5"><div id="learn-progress-bar" class="quiz-progress-bar" style="width: 0%"></div></div>
          <div class="flex items-center justify-between text-xs text-white/60 mb-3">
            <span id="learn-progress-text">0 / 0 个</span>
            <button id="learn-reset" class="text-[10px] text-white/40 hover:text-white">重置</button>
          </div>

          <div class="panel-section-title mb-2">概念清单</div>
          <div id="concept-list-panel" class="flex-1 overflow-y-auto space-y-1.5 pr-1"></div>
        </aside>

      </div>
    </div>

    <!-- Tab 3: AI 追问 -->
    <div id="tab-chat" class="tab-panel hidden">
      <div class="bg-inkSoft rounded-xl2 flex flex-col" style="height: 600px">
        <div id="chat-suggestions" class="p-4 border-b border-inkLine flex flex-wrap gap-2"></div>
        <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-4 border-t border-inkLine flex gap-2">
          <input
            id="chat-input"
            type="text"
            placeholder="问点什么…"
            class="flex-1 bg-ink border border-inkLine rounded-xl2 px-4 py-3 focus:outline-none focus:border-brand transition"
          />
          <button id="chat-send" class="bg-brand hover:bg-brandDeep px-6 py-3 rounded-xl2 font-medium transition">
            发送
          </button>
        </div>
      </div>
    </div>

    <!-- Tab 4: 知识测验 -->
    <div id="tab-quiz" class="tab-panel hidden">
      <div class="max-w-2xl mx-auto">
        <div id="quiz-card" class="bg-inkSoft rounded-xl2 p-8"></div>
      </div>
    </div>

      </div><!-- /right pane -->
    </div><!-- /flex -->
  </section>

  <script src="app.js?v=20260523d" charset="utf-8"></script>
</body>
</html>
