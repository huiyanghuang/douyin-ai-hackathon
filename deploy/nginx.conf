# /etc/nginx/sites-available/douyinhackathon.xinguangtreehole.com
# 启用：ln -s /etc/nginx/sites-available/douyinhackathon.xinguangtreehole.com /etc/nginx/sites-enabled/
# HTTPS：sudo certbot --nginx -d douyinhackathon.xinguangtreehole.com
# certbot 会自动改写本文件，加上 ssl 监听和证书路径。

server {
    listen 80;
    server_name douyinhackathon.xinguangtreehole.com;

    client_max_body_size 120M;

    # 静态前端（前端同学把构建产物放到 /opt/douyin-ai-hackathon/frontend/dist）
    root /opt/douyin-ai-hackathon/frontend/dist;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反代到 FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE friendly：关 buffering，给长读超时
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # SSE / WebSocket 兼容
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
    }

    location /healthz {
        proxy_pass http://127.0.0.1:8000/healthz;
    }
}
