<!-- A1 · 四 Tab 联动：浮动提示 chip -->
<div id="a1-chip" class="a1-chip hidden" role="status" aria-live="polite">
  <span class="a1-chip-icon">↪</span>
  <span class="a1-chip-text">已选中：<b id="a1-chip-name"></b><span class="a1-chip-hint"> · 在卡片中查看</span></span>
  <button id="a1-chip-go" class="a1-chip-go" type="button" aria-label="跳转到知识卡片">→</button>
  <button id="a1-chip-close" class="a1-chip-close" type="button" aria-label="关闭">×</button>
</div>
